e.lose{color:var(--text-red);text-shadow:var(--glow-red);animation:flickerRed 1.5s infinite;}.dead-title.win{color:var(--text-gold);text-shadow:var(--glow-gold);animation:flickerGold 1s infinite;}.dead-scores{text-align:center;line-height:2;font-size:15px;color:var(--text-white);}.dead-scores span{color:var(--text);text-shadow:var(--glow-text);}.dead-encourage{font-size:13px;color:var(--text-dim);text-align:center;}.dead-encourage.win-tip{color:var(--text-gold);text-shadow:var(--glow-gold);animation:pulse 1.2s ease-in-out infinite;font-size:15px;}.btn-group{display:flex;flex-direction:column;gap:12px;width:100%;max-width:260px;}#page-lottery{justify-content:center;gap:20px;}.lottery-title{font-size:20px;color:var(--text-gold);text-shadow:var(--glow-gold);text-align:center;letter-spacing:2px;}.lottery-hint{font-size:12px;color:var(--text-dim);animation:pulse 1.5s ease-in-out infinite;}.boxes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:320px;}#page-result{justify-content:center;gap:18px;}.result-title{font-size:18px;color:var(--text-gold);text-shadow:var(--glow-gold);letter-spacing:2px;}#canvas-prize{border-radius:16px;}.result-prize-name{font-size:20px;color:var(--text-gold);text-shadow:var(--glow-gold);text-align:center;letter-spacing:1px;}.result-desc{font-size:14px;color:var(--text-white);text-align:center;line-height:1.8;max-width:300px;padding:12px 16px;border:1px solid var(--box-border);border-radius:8px;background:var(--box-bg);}.result-redeem{font-size:12px;color:var(--text-dim);animation:pulse 2s ease-in-out infinite;}#page-review{justify-content:center;gap:16px;overflow-y:auto;}.review-title{font-size:18px;color:var(--border);text-shadow:var(--glow-border);text-align:center;letter-spacing:2px;}.review-subtitle{font-size:13px;color:var(--text-dim);letter-spacing:1px;}.review-list{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;}.review-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border:1px solid var(--box-border);border-radius:8px;background:var(--box-bg);}.review-item-num{font-size:12px;color:var(--text-dim);min-width:36px;}.review-item-icon{width:36px;height:36px;flex-shrink:0;}.review-item-name{font-size:13px;color:var(--text-white);line-height:1.4;}.review-footer{font-size:14px;color:var(--text-gold);text-shadow:var(--glow-gold);text-align:center;margin-top:4px;}.review-redeem{font-size:12px;color:var(--text-dim);}#canvas-particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;}

border);box-shadow:none;opacity:0.3;cursor:not-allowed;animation:none;}.box-item.dimmed .box-front:hover{animation:none;box-shadow:none;}.score-val{color:var(--text);text-shadow:var(--glow-text);}.best-val{color:var(--text-dim);}.divider{width:100%;max-width:300px;height:1px;background:linear-gradient(90deg,transparent,var(--box-border),transparent);}

<script>const PRIZES = [
 {
 id: 0,

 },

 },
 {

 },
 {

 desc: '想不到其他了，万一抽到这个就欠我一个蛋糕吧',
 color: '#ffdd44',
 draw: drawCake,
 },
 {
 id: 8,
 name: '请yy吃饭',
 desc: '想不到其他了，万一抽到这个就请我吃一顿贵贵的饭吧',
 color: '#ff8844',
 draw: drawDinner,
 },
];
function shufflePrizes() {
 const arr = PRIZES.map((_, i) => i); 
 for (let i = arr.length - 1; i > 0; i--) {
 const j = Math.floor(Math.random() * (i + 1));
 [arr[i], arr[j]] = [arr[j], arr[i]];
 }
 return arr; 
}
function drawFirework(ctx, cx, cy, size) {
 const r = size * 0.85;
 ctx.save();
 ctx.beginPath();
 ctx.arc(cx, cy, r, 0, Math.PI * 2);
 ctx.fillStyle = '#050512';
 ctx.fill();
 const rays = 12;
 for (let i = 0; i < rays; i++) {
 const angle = (i / rays) * Math.PI * 2;
 const colors = ['#4488ff', '#88aaff', '#aaccff', '#ffffff', '#6699ff'];
 const c = colors[i % colors.length];
 const len = r * (0.5 + 0.5 * ((i % 3) / 3));
 ctx.beginPath();
 ctx.moveTo(cx, cy);
 ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
 ctx.strokeStyle = c;
 ctx.lineWidth = 2;
 ctx.shadowColor = c;
 ctx.shadowBlur = 6;
 ctx.stroke();
 }
 ctx.beginPath();
 ctx.arc(cx, cy, r * 0.12, 0, Math.PI * 2);
 ctx.fillStyle = '#ffffff';
 ctx.shadowColor = '#aaccff';
 ctx.shadowBlur = 12;
 ctx.fill();
 for (let i = 0; i < 16; i++) {
 const angle = (i / 16) * Math.PI * 2;
 const dist = r * (0.55 + Math.random() * 0.2);
 ctx.beginPath();
 ctx.arc(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist, 2, 0, Math.PI * 2);
 ctx.fillStyle = '#88bbff';
 ctx.shadowBlur = 4;
 ctx.fill();
 }
 ctx.restore();
}
function drawDecisionCard(ctx, cx, cy, size) {
 const r = size * 0.85;
 ctx.save();
 ctx.beginPath();
 ctx.arc(cx, cy, r, 0, Math.PI * 2);
 ctx.fillStyle = '#150a1a';
 ctx.fill();
 const cw = r * 1.1, ch = r * 1.3;
 const cx0 = cx - cw / 2, cy0 = cy - ch / 2;
 roundRect(ctx, cx0, cy0, cw, ch, 6);
 ctx.fillStyle = '#2a0a3a';
 ctx.fill();
 ctx.strokeStyle = '#ff88cc';
 ctx.lineWidth = 2;
 ctx.shadowColor = '#ff88cc';
 ctx.shadowBlur = 8;
 ctx.stroke();
 ctx.font = `bold ${r * 0.8}px sans-serif`;
 ctx.fillStyle = '#ff88cc';
 ctx.textAlign = 'center';
 ctx.textBaseline = 'middle';
 ctx.shadowColor = '#ff88cc';
 ctx.shadowBlur = 14;
 ctx.fillText('?', cx, cy);
 drawStar4(ctx, cx0 + 8, cy0 + 8, 5, '#ffaadd');
 drawStar4(ctx, cx0 + cw - 8, cy0 + 8, 5, '#ffaadd');
 ctx.restore();
}
function drawLeg(ctx, cx, cy, size) {
 const r = size * 0.85;
 ctx.save();
 ctx.beginPath();
 ctx.arc(cx, cy, r, 0, Math.PI * 2);
 ctx.fillStyle = '#1a0c00';
 ctx.fill();
 ctx.translate(cx, cy);
 ctx.rotate(-0.6);
 const meatW = r * 0.52, meatH = r * 0.72;
 const meatX = 0, meatY = -r * 0.1;
 const meatGrad = ctx.createRadialGradient(meatX - meatW * 0.2, meatY - meatH * 0.2, 0, meatX, meatY, meatW);
 meatGrad.addColorStop(0, '#ffcc88');
 meatGrad.addColorStop(0.4, '#e8882a');
 meatGrad.addColorStop(0.8, '#c05010');
 meatGrad.addColorStop(1, '#8a2800');
 ctx.beginPath();
 ctx.ellipse(meatX, meatY, meatW, meatH, 0, 0, Math.PI * 2);
 ctx.fillStyle = meatGrad;
 ctx.shadowColor = '#ff8822';
 ctx.shadowBlur = 16;
 ctx.fill();
 ctx.shadowBlur = 0;
 ctx.strokeStyle = 'rgba(80,20,0,0.55)';
 ctx.lineWidth = 2;
 for (let i = 0; i < 4; i++) {
 const oy = meatY - meatH * 0.45 + i * meatH * 0.28;
 const hw = meatW * Math.sqrt(1 - Math.pow((oy - meatY) / meatH, 2)) * 0.85;
 ctx.beginPath();
 ctx.ellipse(meatX, oy, hw, hw * 0.18, 0, 0, Math.PI);
 ctx.stroke();
 }
 const boneX = meatX + meatW * 0.05;
 const boneTop = meatY + meatH * 0.55;
 const boneH = r * 0.55, boneW = r * 0.1;
 const boneGrad = ctx.createLinearGradient(boneX - boneW, boneTop, boneX + boneW, boneTop);
 boneGrad.addColorStop(0, '#e0e0e0');
 boneGrad.addColorStop(0.5, '#ffffff');
 boneGrad.addColorStop(1, '#c0c0c0');
 roundRect(ctx, boneX - boneW / 2, boneTop, boneW, boneH, boneW / 2);
 ctx.fillStyle = boneGrad;
 ctx.shadowColor = '#aaaaaa';
 ctx.shadowBlur = 4;
 ctx.fill();
 ctx.beginPath();
 ctx.arc(boneX, boneTop + boneH, boneW * 1.3, 0, Math.PI * 2);
 ctx.fillStyle = '#f0f0f0';
 ctx.shadowColor = '#bbbbbb';
 ctx.shadowBlur = 6;
 ctx.fill();
 ctx.beginPath();
 ctx.arc(boneX, boneTop + boneH * 0.08, boneW * 1.1, 0, Math.PI * 2);
 ctx.fillStyle = '#f8f8f8';
 ctx.fill();
 ctx.shadowBlur = 0;
 ctx.beginPath();
 ctx.ellipse(meatX - meatW * 0.25, meatY - meatH * 0.3, meatW * 0.2, meatH * 0.12, -0.5, 0, Math.PI * 2);
 ctx.fillStyle = 'rgba(255,240,180,0.55)';
 ctx.fill();
 ctx.restore();
}
function drawIceCream(ctx, cx, cy, size) {
 const r = size * 0.85;
 ctx.save();
 ctx.beginPath();
 ctx.arc(cx, cy, r, 0, Math.PI * 2);
 ctx.fillStyle = '#050f14';
 ctx.fill();
 const coneH = r * 0.75, coneW = r * 0.55;
 const top = cy - r * 0.3;
 ctx.beginPath();
 ctx.moveTo(cx - coneW / 2, top);
 ctx.lineTo(cx, top + coneH);
 ctx.lineTo(cx + coneW / 2, top);
 ctx.closePath();
 ctx.fillStyle = '#c8882a';
 ctx.fill();
 ctx.strokeStyle = '#a06010';
 ctx.lineWidth = 1;
 for (let i = 0; i < 4; i++) {
 const y = top + (coneH / 4) * i;
 const hw = (coneW / 2) * (1 - i / 4);
 ctx.beginPath(); ctx.moveTo(cx - hw, y); ctx.lineTo(cx + hw, y); ctx.stroke();
 }
 const ballR = coneW * 0.7;
 ctx.beginPath();
 ctx.arc(cx, top, ballR, 0, Math.PI * 2);
 const grad = ctx.createRadialGradient(cx - ballR * 0.2, top - ballR * 0.2, 0, cx, top, ballR);
 grad.addColorStop(0, '#ffffff');
 grad.addColorStop(0.5, '#aaeeff');
 grad.addColorStop(1, '#44ccee');
 ctx.fillStyle = grad;
 ctx.shadowColor = '#aaeeff';
 ctx.shadowBlur = 14;
 ctx.fill();
 ctx.beginPath();
 ctx.arc(cx, top + ballR * 0.3, ballR * 0.35, 0, Math.PI * 2);
 ctx.fillStyle = '#5a2800';
 ctx.shadowBlur = 0;
 ctx.fill();
 ctx.restore();
}
function drawBusWindow(ctx, cx, cy, size) {
 const r = size * 0.85;
 ctx.save();
 ctx.beginPath();
 ctx.arc(cx, cy, r, 0, Math.PI * 2);
 ctx.fillStyle = '#040d12';
 ctx.fill();
 const bw = r * 1.75, bh = r * 0.9;
 const bx = cx - bw / 2, by = cy - bh / 2 + r * 0.08;
 roundRect(ctx, bx, by, bw, bh, r * 0.12);
 const bodyGrad = ctx.createLinearGradient(bx, by, bx, by + bh);
 bodyGrad.addColorStop(0, '#1a6644');
 bodyGrad.addColorStop(0.5, '#0f4a30');
 bodyGrad.addColorStop(1, '#0a3322');
 ctx.fillStyle = bodyGrad;
 ctx.shadowColor = '#44ff88';
 ctx.shadowBlur = 14;
 ctx.fill();
 roundRect(ctx, bx, by, bw, bh, r * 0.12);
 ctx.strokeStyle = '#44ff88';
 ctx.lineWidth = 2;
 ctx.stroke();
 roundRect(ctx, bx + bw * 0.05, by - bh * 0.22, bw * 0.9, bh * 0.25, r * 0.08);
 ctx.fillStyle = '#0f4a30';
 ctx.shadowBlur = 0;
 ctx.fill();
 roundRect(ctx, bx + bw * 0.05, by - bh * 0.22, bw * 0.9, bh * 0.25, r * 0.08);
 ctx.strokeStyle = '#44ff8888';
 ctx.lineWidth = 1.5;
 ctx.stroke();
 ctx.shadowBlur = 0;
 const winW = bw * 0.22, winH = bh * 0.36;
 const winY = by + bh * 0.1;
 const winPositions = [bx + bw * 0.08, bx + bw * 0.37, bx + bw * 0.66];
 winPositions.forEach((wx, i) => {
 roundRect(ctx, wx, winY, winW, winH, r * 0.05);
 const wg = ctx.createLinearGradient(wx, winY, wx, winY + winH);
 wg.addColorStop(0, '#1a3a5a');
 wg.addColorStop(1, '#0a1a2a');
 ctx.fillStyle = wg;
 ctx.fill();
 roundRect(ctx, wx, winY, winW, winH, r * 0.05);
 ctx.strokeStyle = i === 1 ? '#00ffff' : '#44aacc'; 
 ctx.lineWidth = i === 1 ? 2.5 : 1.5;
 ctx.shadowColor = i === 1 ? '#00ffff' : 'transparent';
 ctx.shadowBlur = i === 1 ? 8 : 0;
 ctx.stroke();
 ctx.shadowBlur = 0;
 if (i === 1) {
 ctx.fillStyle = '#00ffff';
 ctx.font = `${winH * 0.5}px sans-serif`;
 ctx.textAlign = 'center';
 ctx.textBaseline = 'middle';
 ctx.shadowColor = '#00ffff';
 ctx.shadowBlur = 6;
 ctx.fillText('★', wx + winW / 2, winY + winH / 2);
 ctx.shadowBlur = 0;
 }
 });
 const doorW = bw * 0.14, doorH = bh * 0.58;
 const doorX = bx + bw * 0.82, doorY = by + bh * 0.38;
 roundRect(ctx, doorX, doorY, doorW, doorH, r * 0.04);
 ctx.fillStyle = '#0a2a1a';
 ctx.fill();
 roundRect(ctx, doorX, doorY, doorW, doorH, r * 0.04);
 ctx.strokeStyle = '#44ff8866';
 ctx.lineWidth = 1.5;
 ctx.stroke();
 ctx.beginPath();
 ctx.moveTo(doorX + doorW / 2, doorY + 2);
 ctx.lineTo(doorX + doorW / 2, doorY + doorH - 2);
 ctx.strokeStyle = '#44ff8844';
 ctx.lineWidth = 1;
 ctx.stroke();
 ctx.beginPath();
 ctx.ellipse(bx + r * 0.08, by + bh * 0.72, r * 0.1, r * 0.07, 0, 0, Math.PI * 2);
 ctx.fillStyle = '#ffee88';
 ctx.shadowColor = '#ffee88';
 ctx.shadowBlur = 10;
 ctx.fill();
 ctx.beginPath();
 ctx.ellipse(bx + bw - r * 0.08, by + bh * 0.72, r * 0.1, r * 0.07, 0, 0, Math.PI * 2);
 ctx.fillStyle = '#ff4444';
 ctx.shadowColor = '#ff4444';
 ctx.shadowBlur = 10;
 ctx.fill();
 ctx.shadowBlur = 0;
 const wheelR = r * 0.17;
 const wheelY = by + bh + wheelR * 0.35;
 [bx + bw * 0.2, bx + bw * 0.75].forEach(wx => {
 ctx.beginPath();
 ctx.arc(wx, wheelY, wheelR, 0, Math.PI * 2);
 ctx.fillStyle = '#1a1a1a';
 ctx.shadowColor = '#44ff8844';
 ctx.shadowBlur = 6;
 ctx.fill();
 ctx.strokeStyle = '#44ff88';
 ctx.lineWidth = 2;
 ctx.stroke();
 ctx.beginPath();
 ctx.arc(wx, wheelY, wheelR * 0.45, 0, Math.PI * 2);
 ctx.fillStyle = '#2a2a2a';
 ctx.shadowBlur = 0;
 ctx.fill();
 ctx.strokeStyle = '#888888';
 ctx.lineWidth = 1.5;
 ctx.stroke();
 for (let i = 0; i < 4; i++) {
 const a = (i / 4) * Math.PI * 2;
 ctx.beginPath();
 ctx.moveTo(wx + Math.cos(a) * wheelR * 0.45, wheelY + Math.sin(a) * wheelR * 0.45);
 ctx.lineTo(wx + Math.cos(a) * wheelR * 0.9, wheelY + Math.sin(a) * wheelR * 0.9);
 ctx.strokeStyle = '#666666';
 ctx.lineWidth = 1.5;
 ctx.stroke();
 }
 });
 ctx.beginPath();
 ctx.moveTo(bx - r * 0.1, wheelY + wheelR);
 ctx.lineTo(bx + bw + r * 0.1, wheelY + wheelR);
 ctx.strokeStyle = '#44ff8844';
 ctx.lineWidth = 1;
 ctx.stroke();
 ctx.restore();
}
function drawMeal(ctx, cx, cy, size) {
 const r = size * 0.85;
 ctx.save();
 ctx.beginPath();
 ctx.arc(cx, cy, r, 0, Math.PI * 2);
 ctx.fillStyle = '#120a00';
 ctx.fill();
 ctx.beginPath();
 ctx.ellipse(cx, cy + r * 0.2, r * 0.65, r * 0.25, 0, 0, Math.PI * 2);
 ctx.fillStyle = '#e8d8b0';
 ctx.fill();
 ctx.beginPath();
 ctx.ellipse(cx, cy + r * 0.2, r * 0.65, r * 0.25, 0, Math.PI, 0);
 ctx.fillStyle = '#c8aa70';
 ctx.fill();
 ctx.beginPath();
 ctx.ellipse(cx, cy + r * 0.2, r * 0.65, r * 0.25, 0, 0, Math.PI * 2);
 ctx.strokeStyle = '#ffaa44';
 ctx.lineWidth = 2;
 ctx.shadowColor = '#ffaa44';
 ctx.shadowBlur = 8;
 ctx.stroke();
 for (let i = 0; i < 5; i++) {
 const angle = (i / 5) * Math.PI + Math.PI;
 ctx.beginPath();
 ctx.moveTo(cx + Math.cos(angle) * r * 0.4, cy + r * 0.15);
 ctx.quadraticCurveTo(
 cx + Math.cos(angle) * r * 0.2, cy - r * 0.05,
 cx + Math.cos(angle + 0.5) * r * 0.35, cy + r * 0.05
 );
 ctx.strokeStyle = '#fff0cc';
 ctx.lineWidth = 2.5;
 ctx.shadowBlur = 3;
 ctx.stroke();
 }
 ctx.font = `${r * 0.35}px sans-serif`;
 ctx.textAlign = 'center';
 ctx.textBaseline = 'middle';
 ctx.shadowColor = '#ff4488';
 ctx.shadowBlur = 10;
 ctx.fillText('♥', cx, cy - r * 0.45);
 ctx.restore();
}
function drawApology(ctx, cx, cy, size) {
 const r = size * 0.85;
 ctx.save();
 ctx.beginPath();
 ctx.arc(cx, cy, r, 0, Math.PI * 2);
 ctx.fillStyle = '#100010';
 ctx.fill();
 const bw = r * 1.55, bh = r * 0.75;
 const bx = cx - bw / 2, by = cy - r * 0.25 - bh / 2;
 roundRect(ctx, bx, by, bw, bh, r * 0.15);
 ctx.fillStyle = '#2a0033';
 ctx.fill();
 roundRect(ctx, bx, by, bw, bh, r * 0.15);
 ctx.strokeStyle = '#ff44aa';
 ctx.lineWidth = 2.5;
 ctx.shadowColor = '#ff44aa';
 ctx.shadowBlur = 12;
 ctx.stroke();
 ctx.shadowBlur = 0;
 const tailX = cx + r * 0.3, tailY = by + bh;
 ctx.beginPath();
 ctx.moveTo(tailX - r * 0.08, tailY);
 ctx.lineTo(tailX + r * 0.22, tailY + r * 0.32);
 ctx.lineTo(tailX + r * 0.14, tailY);
 ctx.fillStyle = '#2a0033';
 ctx.fill();
 ctx.strokeStyle = '#ff44aa';
 ctx.lineWidth = 2.5;
 ctx.shadowColor = '#ff44aa';
 ctx.shadowBlur = 8;
 ctx.stroke();
 ctx.shadowBlur = 0;
 ctx.font = `bold ${r * 0.38}px sans-serif`;
 ctx.fillStyle = '#ff88dd';
 ctx.textAlign = 'center';
 ctx.textBaseline = 'middle';
 ctx.shadowColor = '#ff44aa';
 ctx.shadowBlur = 10;
 ctx.fillText('对不起！', cx, cy - r * 0.25);
 ctx.shadowBlur = 0;
 const marks = ['!', '!', '!'];
 marks.forEach((m, i) => {
 ctx.font = `bold ${r * 0.22}px sans-serif`;
 ctx.fillStyle = `rgba(255,100,180,${0.8 - i * 0.2})`;
 ctx.shadowColor = '#ff44aa';
 ctx.shadowBlur = 4;
 ctx.fillText(m, tailX + r * 0.28 + i * r * 0.2, tailY + r * 0.28 + i * r * 0.14);
 });
 ctx.shadowBlur = 0;
 ctx.restore();
}
function drawCake(ctx, cx, cy, size) {
 const r = size * 0.85;
 ctx.save();
 ctx.beginPath();
 ctx.arc(cx, cy, r, 0, Math.PI * 2);
 ctx.fillStyle = '#120800';
 ctx.fill();
 const layers = [
 { y: cy + r * 0.45, w: r * 1.1, h: r * 0.35, color: '#e8c4a0', cream: '#fff0e0' },
 { y: cy + r * 0.1, w: r * 0.85, h: r * 0.32, color: '#d4a070', cream: '#ffe8cc' },
 { y: cy - r * 0.2, w: r * 0.6, h: r * 0.28, color: '#c07840', cream: '#ffd8aa' },
 ];
 layers.forEach(l => {
 roundRect(ctx, cx - l.w / 2, l.y - l.h, l.w, l.h, 4);
 ctx.fillStyle = l.color;
 ctx.fill();
 ctx.beginPath();
 ctx.ellipse(cx, l.y - l.h, l.w / 2, l.h * 0.22, 0, 0, Math.PI * 2);
 ctx.fillStyle = l.cream;
 ctx.fill();
 });
 const candleX = [cx - r * 0.2, cx, cx + r * 0.2];
 const candleColors = ['#ff4488', '#ffdd44', '#44aaff'];
 candleX.forEach((x, i) => {
 const baseY = layers[2].y - layers[2].h + 2;
 ctx.fillStyle = candleColors[i];
 ctx.shadowColor = candleColors[i];
 ctx.shadowBlur = 6;
 roundRect(ctx, x - 4, baseY - r * 0.25, 8, r * 0.25, 2);
 ctx.fill();
 ctx.beginPath();
 ctx.ellipse(x, baseY - r * 0.3, 4, 7, 0, 0, Math.PI * 2);
 ctx.fillStyle = '#ffee44';
 ctx.shadowColor = '#ffcc00';
 ctx.shadowBlur = 10;
 ctx.fill();
 });
 ctx.restore();
}
function drawDinner(ctx, cx, cy, size) {
 const r = size * 0.85;
 ctx.save();
 ctx.beginPath();
 ctx.arc(cx, cy, r, 0, Math.PI * 2);
 ctx.fillStyle = '#0a0800';
 ctx.fill();
 ctx.beginPath();
 ctx.ellipse(cx, cy + r * 0.15, r * 0.65, r * 0.2, 0, 0, Math.PI * 2);
 ctx.fillStyle = '#e8e0d0';
 ctx.fill();
 ctx.beginPath();
 ctx.ellipse(cx, cy + r * 0.1, r * 0.5, r * 0.15, 0, 0, Math.PI * 2);
 ctx.fillStyle = '#f8f0e0';
 ctx.fill();
 ctx.beginPath();
 ctx.ellipse(cx, cy + r * 0.05, r * 0.35, r * 0.1, 0, 0, Math.PI * 2);
 ctx.fillStyle = '#c85020';
 ctx.shadowColor = '#ff6633';
 ctx.shadowBlur = 8;
 ctx.fill();
 ctx.shadowBlur = 0;
 ctx.beginPath();
 ctx.moveTo(cx - r * 0.5, cy - r * 0.5);
 ctx.lineTo(cx - r * 0.5, cy + r * 0.4);
 ctx.strokeStyle = '#c0c0c0';
 ctx.lineWidth = 3;
 ctx.lineCap = 'round';
 ctx.stroke();
 ctx.beginPath();
 ctx.moveTo(cx + r * 0.5, cy - r * 0.5);
 ctx.lineTo(cx + r * 0.5, cy + r * 0.4);
 ctx.strokeStyle = '#c0c0c0';
 ctx.lineWidth = 3;
 ctx.stroke();
 ctx.font = `${r * 0.25}px sans-serif`;
 ctx.textAlign = 'center';
 ctx.textBaseline = 'middle';
 ctx.shadowColor = '#ffdd44';
 ctx.shadowBlur = 8;
 ctx.fillText('⭐', cx - r * 0.3, cy - r * 0.5);
 ctx.fillText('⭐', cx + r * 0.3, cy - r * 0.5);
 ctx.restore();
}
function roundRect(ctx, x, y, w, h, r) {
 ctx.beginPath();
 ctx.moveTo(x + r, y);
 ctx.lineTo(x + w - r, y);
 ctx.quadraticCurveTo(x + w, y, x + w, y + r);
 ctx.lineTo(x + w, y + h - r);
 ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
 ctx.lineTo(x + r, y + h);
 ctx.quadraticCurveTo(x, y + h, x, y + h - r);
 ctx.lineTo(x, y + r);
 ctx.quadraticCurveTo(x, y, x + r, y);
 ctx.closePath();
}
function drawStar4(ctx, x, y, r, color) {
 ctx.save();
 ctx.fillStyle = color;
 ctx.shadowColor = color;
 ctx.shadowBlur = 6;
 ctx.beginPath();
 for (let i = 0; i < 4; i++) {
 const a = (i / 4) * Math.PI * 2;
 const a2 = ((i + 0.5) / 4) * Math.PI * 2;
 ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
 ctx.lineTo(x + Math.cos(a2) * r * 0.4, y + Math.sin(a2) * r * 0.4);
 }
 ctx.closePath();
 ctx.fill();
 ctx.restore();
}
function drawCloud(ctx, cx, cy, r) {
 ctx.save();
 ctx.fillStyle = 'rgba(255,255,255,0.7)';
 ctx.shadowBlur = 0;
 [[0, 0, r * 0.5], [-r * 0.5, r * 0.2, r * 0.4], [r * 0.5, r * 0.2, r * 0.4]].forEach(([dx, dy, cr]) => {
 ctx.beginPath();
 ctx.arc(cx + dx, cy + dy, cr, 0, Math.PI * 2);
 ctx.fill();
 });
 ctx.restore();
}
function drawPrizeThumbnail(canvas, prizeIndex) {
 const ctx = canvas.getContext('2d');
 const s = canvas.width;
 ctx.clearRect(0, 0, s, s);
 const prize = PRIZES[prizeIndex];
 prize.draw(ctx, s / 2, s / 2, s * 0.42);
}
function drawPrizeLarge(canvas, prizeIndex) {
 const ctx = canvas.getContext('2d');
 const s = canvas.width;
 ctx.clearRect(0, 0, s, s);
 const prize = PRIZES[prizeIndex];
 ctx.save();
 ctx.beginPath();
 ctx.arc(s / 2, s / 2, s * 0.46, 0, Math.PI * 2);
 ctx.fillStyle = prize.color + '22';
 ctx.fill();
 ctx.strokeStyle = prize.color;
 ctx.lineWidth = 2;
 ctx.shadowColor = prize.color;
 ctx.shadowBlur = 16;
 ctx.stroke();
 ctx.restore();
 prize.draw(ctx, s / 2, s / 2, s * 0.42);
}</script>
