<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>三旬老人也要过儿童节</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
<div id="app">

  <!-- 全局粒子层 -->
  <canvas id="canvas-particles"></canvas>

  <!-- 静音按钮（固定右上角） -->
  <button id="btn-mute" style="
    position:fixed;top:12px;right:12px;z-index:200;
    background:transparent;border:1px solid var(--box-border);
    color:var(--text-dim);font-size:16px;padding:4px 8px;
    border-radius:4px;cursor:pointer;font-family:var(--font-mono);
  ">🔊</button>

  <!-- ==================== 开始页 ==================== -->
  <div id="page-start" class="page">
    <div style="height:60px"></div>

    <div class="start-title">
      三旬老人<br>也要过儿童节
    </div>

    <div class="start-snake-deco">🐍 ～～～</div>

    <div id="start-chances" class="chances-row">
      剩余机会
      <span class="chance-dot"></span>
      <span class="chance-dot"></span>
      <span class="chance-dot"></span>
      <span class="chance-dot"></span>
    </div>

    <div style="width:100%;max-width:260px">
      <button id="btn-start" class="btn btn-gold">开始游戏</button>
    </div>

    <div id="start-best" class="start-best">BEST: 0000</div>
  </div>

  <!-- ==================== 游戏页 ==================== -->
  <div id="page-game" class="page">
    <div class="game-header">
      <div class="progress-row">
        <span id="progress-label" class="progress-label">还差 61 分解锁盲盒 🎁</span>
        <span id="progress-score" class="progress-score">0 / 61</span>
      </div>
      <div class="progress-bar-bg">
        <div id="progress-bar-fill" class="progress-bar-fill" style="width:0%"></div>
        <div id="progress-bar-glow" class="progress-bar-glow" style="width:0%"></div>
      </div>
      <div class="progress-footer">
        <div id="game-chances" class="game-chances">
          <span class="chance-dot"></span>
          <span class="chance-dot"></span>
          <span class="chance-dot"></span>
          <span class="chance-dot"></span>
        </div>
      </div>
    </div>

    <canvas id="canvas-game"></canvas>

    <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-top:10px;">
      <div class="game-hint">SWIPE TO MOVE</div>
      <button id="btn-pause" style="
        background:transparent;
        border:1px solid var(--text-dim);
        color:var(--text-dim);
        font-size:18px;
        width:34px;height:34px;
        border-radius:6px;
        cursor:pointer;
        line-height:1;
        transition:all 0.2s;
        flex-shrink:0;
      ">⏸</button>
    </div>
  </div>

  <!-- ==================== 结束页 ==================== -->
  <div id="page-dead" class="page">
    <div id="dead-title" class="dead-title lose">GAME OVER</div>

    <div class="dead-scores">
      得分：<span id="dead-score">0000</span><br>
      最高：<span id="dead-best">0000</span>
    </div>

    <div id="dead-encourage" class="dead-encourage"></div>

    <div class="btn-group">
      <button id="btn-lottery" class="btn btn-gold">🎁 打开盲盒！</button>
      <button id="btn-retry" class="btn">再玩一次</button>
    </div>
  </div>

  <!-- ==================== 盲盒页 ==================== -->
  <div id="page-lottery" class="page">
    <div class="lottery-title">🎁 开盲盒！</div>
    <div class="lottery-hint">选择一个盲盒，只有一次机会 ✨</div>

    <div class="boxes-grid">
      <!-- JS动态生成9个盲盒 -->
    </div>
  </div>

  <!-- ==================== 奖品结果页 ==================== -->
  <div id="page-result" class="page">
    <div class="result-title">🎊 恭喜！</div>

    <canvas id="canvas-prize" width="180" height="180"
      style="animation: prizeIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards, float 3s ease-in-out 0.6s infinite;">
    </canvas>

    <div id="result-prize-name" class="result-prize-name"></div>

    <div class="divider"></div>

    <div id="result-desc" class="result-desc"></div>

    <div class="result-redeem">📸 截图保存，找我兑奖！</div>

    <div class="btn-group" style="max-width:260px">
      <button id="btn-result-next" class="btn">继续游戏</button>
      <button id="btn-result-review" class="btn btn-ghost" style="display:none">查看全部奖品 →</button>
    </div>
  </div>

  <!-- ==================== 惊喜盲盒页 ==================== -->
  <div id="page-surprise" class="page" style="justify-content:center;align-items:center;text-align:center;gap:18px;">
    <div class="lottery-title" style="color:var(--text-gold);font-size:16px;line-height:1.8">
      🎊 六一儿童节的倒霉蛋<br>特别惊喜奖
    </div>

    <!-- 翻开前显示 -->
    <div id="surprise-before" style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div class="lottery-hint" style="max-width:280px;line-height:1.8">
        没抽中但我也非要勉强，请查收～
      </div>
      <div id="surprise-box" class="box-item" style="width:130px;height:130px;">
        <div class="box-inner">
          <div class="box-front">
            <span class="box-question">?</span>
            <span class="box-star">✦ ✦ ✦</span>
          </div>
          <div class="box-back">
            <canvas id="canvas-surprise-thumb" width="90" height="90"></canvas>
          </div>
        </div>
      </div>
      <div class="lottery-hint">点击盲盒开启 ✨</div>
    </div>

    <!-- 翻开后显示 -->
    <div id="surprise-after" style="display:none;flex-direction:column;align-items:center;gap:16px;">
      <div id="surprise-prize-name" class="result-prize-name"></div>
      <div class="divider"></div>
      <div id="surprise-prize-desc" class="result-desc"></div>
      <div class="result-redeem">📸 截图保存，找我兑奖！</div>
      <div style="width:100%;max-width:260px">
        <button id="btn-surprise-review" class="btn">查看结果 →</button>
      </div>
    </div>
  </div>

  <!-- ==================== 回顾页 ==================== -->
  <div id="page-review" class="page">
    <div class="review-title">🎊 活动已结束</div>
    <div class="review-subtitle">三旬老人也要过儿童节</div>

    <div class="divider"></div>

    <!-- 已抽中 -->
    <div style="font-size:13px;color:var(--text-gold);letter-spacing:1px;">✨ 已抽中</div>
    <div id="review-list-won" class="review-list">
      <!-- JS动态生成 -->
    </div>

    <div class="divider"></div>

    <!-- 未抽中 -->
    <div style="font-size:13px;color:var(--text-dim);letter-spacing:1px;">— 未抽中 —</div>
    <div id="review-list-missed" class="review-list">
      <!-- JS动态生成 -->
    </div>

    <div class="divider"></div>

    <div class="review-footer">祝你儿童节快乐 🎉</div>
    <div class="review-redeem">📸 截图保存，找我兑奖！</div>
  </div>

</div><!-- #app -->

<!-- JS模块（顺序很重要） -->
<script src="js/storage.js"></script>
<script src="js/prizes.js"></script>
<script src="js/audio.js"></script>
<script src="js/input.js"></script>
<script src="js/renderer.js"></script>
<script src="js/game.js"></script>
<script src="js/lottery.js"></script>
<script src="js/main.js"></script>
</body>
</html>
