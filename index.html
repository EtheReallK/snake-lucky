<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>三旬老人也要过儿童节</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
<div id="app">

  <!-- 全局粒子层 -->
  <canvas id="canvas-particles"></canvas>

  <!-- 静音按钮 -->
  <button id="btn-mute" style="
    position:fixed;top:12px;right:12px;z-index:200;
    background:transparent;border:1px solid var(--box-border);
    color:var(--text-dim);font-size:16px;padding:4px 8px;
    border-radius:4px;cursor:pointer;font-family:var(--font-mono);
  ">🔊</button>

  <!-- ==================== 抽盲盒页 ==================== -->
  <div id="page-lottery" class="page">
    <div class="lottery-title">🎁 三旬老人也要过儿童节</div>
    <div id="lottery-chances" class="chances-row" style="justify-content:center;">
      剩余机会
      <span class="chance-dot"></span>
      <span class="chance-dot"></span>
      <span class="chance-dot"></span>
      <span class="chance-dot"></span>
    </div>
    <div class="lottery-hint">选择一个盲盒 ✨</div>
    <div class="boxes-grid">
      <!-- JS动态生成9个盲盒 -->
    </div>
  </div>

  <!-- ==================== 奖品结果页 ==================== -->
  <div id="page-result" class="page">
    <div id="result-title" class="result-title">🎊 恭喜！</div>

    <canvas id="canvas-prize" width="180" height="180"
      style="animation: prizeIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards, float 3s ease-in-out 0.6s infinite;">
    </canvas>

    <div id="result-prize-name" class="result-prize-name"></div>

    <div class="divider"></div>

    <div id="result-desc" class="result-desc"></div>

    <div class="result-redeem">📸 截图保存，找我兑奖！</div>

    <div class="btn-group" style="max-width:260px">
      <button id="btn-result-next" class="btn">继续</button>
      <button id="btn-result-review" class="btn btn-ghost" style="display:none">查看全部奖品 →</button>
    </div>
  </div>

  <!-- ==================== 惊喜盲盒页 ==================== -->
  <div id="page-surprise" class="page" style="justify-content:center;align-items:center;text-align:center;gap:18px;">
    <div class="lottery-title" style="color:var(--text-gold);font-size:16px;line-height:1.8">
      🎊 六一儿童节的倒霉蛋<br>特别惊喜奖
    </div>

    <div id="surprise-before" style="display:flex;flex-direction:column;align-items:center;gap:16px;">
      <div class="lottery-hint" style="max-width:280px;line-height:1.8">
        没抽中但我也非要勉强，请查收～
      </div>
      <div id="surprise-box" class="box-item" style="width:130px;height:130px;">
        <div class="box-inner">
          <div class="box-front">
            <span class="box-question">?</span>
            <span class="box-star">✦ ✦ ✦</span>
          </div>
          <div class="box-back">
            <canvas id="canvas-surprise-thumb" width="90" height="90"></canvas>
          </div>
        </div>
      </div>
      <div class="lottery-hint">点击盲盒开启 ✨</div>
    </div>

    <div id="surprise-after" style="display:none;flex-direction:column;align-items:center;gap:16px;">
      <div id="surprise-prize-name" class="result-prize-name"></div>
      <div class="divider"></div>
      <div id="surprise-prize-desc" class="result-desc"></div>
      <div class="result-redeem">📸 截图保存，找我兑奖！</div>
      <div style="width:100%;max-width:260px">
        <button id="btn-surprise-review" class="btn">查看结果 →</button>
      </div>
    </div>
  </div>

  <!-- ==================== 回顾页 ==================== -->
  <div id="page-review" class="page">
    <div class="review-title">🎊 活动已结束</div>
    <div class="review-subtitle">三旬老人也要过儿童节</div>

    <div class="divider"></div>

    <div style="font-size:13px;color:var(--text-gold);letter-spacing:1px;">✨ 已抽中</div>
    <div id="review-list-won" class="review-list"></div>

    <div class="divider"></div>

    <div style="font-size:13px;color:var(--text-dim);letter-spacing:1px;">— 未抽中 —</div>
    <div id="review-list-missed" class="review-list"></div>

    <div class="divider"></div>

    <div class="review-footer">祝你儿童节快乐 🎉</div>
    <div class="review-redeem">📸 截图保存，找我兑奖！</div>
  </div>

  <!-- ==================== 次数用完页 ==================== -->
  <div id="page-done" class="page" style="justify-content:center;gap:20px;">
    <div class="review-title">🎊 抽奖已结束</div>
    <div class="review-subtitle">三旬老人也要过儿童节</div>
    <div class="divider"></div>
    <div style="font-size:13px;color:var(--text-dim);text-align:center;line-height:1.8">
      你已用完全部抽奖机会<br>记得截图保存你的奖品哦 📸
    </div>
    <div style="width:100%;max-width:260px">
      <button id="btn-done-review" class="btn">查看全部奖品</button>
    </div>
  </div>

</div><!-- #app -->

<script src="js/storage.js"></script>
<script src="js/prizes.js"></script>
<script src="js/audio.js"></script>
<script src="js/renderer.js"></script>
<script src="js/lottery.js"></script>
<script src="js/main.js"></script>
</body>
</html>
